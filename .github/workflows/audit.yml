name: Loop Readiness Audit (dogfood)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Daily-ish dogfood of the reference itself
    - cron: '17 9 * * *'

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: tools/loop-audit/package-lock.json

      - name: Build & run loop-audit on the reference + starters
        run: |
          cd tools/loop-audit
          npm ci
          npm run build
          echo "=== Audit of repo root ==="
          node dist/cli.js ../../ || true
          echo ""
          echo "=== Audit of starters ==="
          for s in ../../starters/*/; do
            echo "--- $(basename "$s") ---"
            node dist/cli.js "$s" || true
          done

      - name: Report score and gate on critically low (reference is source, not a consumer project)
        run: |
          cd tools/loop-audit
          node dist/cli.js ../../ --json > /tmp/audit.json || true
          SCORE=$(node -e '
            const fs = require("fs");
            try {
              const data = JSON.parse(fs.readFileSync("/tmp/audit.json", "utf8"));
              console.log("Reference score: " + data.score);
              // The reference repo is the *source* of starters/skills, not a running project.
              // It will naturally score lower until we decide to dogfood a .grok/ or STATE at root.
              // Keep a low bar here; the value is that the audit *runs* and surfaces findings.
              if (data.score < 25) {
                console.error("Reference score critically low. Consider adding LOOP.md state signals or .github improvements.");
                process.exit(2);
              }
            } catch (e) {
              console.error("Could not parse audit JSON:", e.message);
              process.exit(0); // do not fail the whole job on parse issues
            }
          ')
